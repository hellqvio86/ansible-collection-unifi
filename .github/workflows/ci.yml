---
name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-mock pyjwt paramiko ansible-core
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Set up Ansible Collection structure
        run: |
          mkdir -p ansible_collections/hellqvio86
          ln -s ../.. ansible_collections/hellqvio86/unifi

      - name: Run Unit Tests
        run: |
          PYTHONPATH=. pytest tests/unit

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff ansible-lint
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Ruff (Python Linting)
        run: ruff check .

      - name: Run Ansible Lint
        run: ansible-lint .

