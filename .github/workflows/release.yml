---
name: Release

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'draft'
        type: choice
        options:
          - draft
          - publish

permissions:
  contents: write

jobs:
  # Creates a draft GitHub release when version changes (auto on push, or manual)
  draft-release:
    if: >
      (github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'draft')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get current version
        id: current
        run: |
          VERSION=$(grep '^version:' galaxy.yml | awk '{print $2}')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check if version changed
        id: changed
        run: |
          IS_MANUAL="${{ github.event_name == 'workflow_dispatch' }}"
          CURRENT="${{ steps.current.outputs.version }}"
          PREVIOUS=$(git show HEAD~1:galaxy.yml 2>/dev/null | grep '^version:' | awk '{print $2}' || echo "none")
          echo "current=${CURRENT}, previous=${PREVIOUS}, manual=${IS_MANUAL}"
          if [ "${IS_MANUAL}" = "true" ] || [ "${CURRENT}" != "${PREVIOUS}" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.changed.outputs.changed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Build collection artifact
        if: steps.changed.outputs.changed == 'true'
        run: make build

      - name: Create draft GitHub release
        if: steps.changed.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.current.outputs.version }}"
          TARBALL="releases/hellqvio86-unifi-${VERSION}.tar.gz"
          
          CHANGELOG_NOTES=$(python3 -c '
          import sys
          version = sys.argv[1]
          with open("CHANGELOG.md", "r") as f:
              content = f.read()
          sections = content.split("\n## ")
          found = ""
          for s in sections:
              lines = s.splitlines()
              if lines and (lines[0].strip().startswith(version) or lines[0].strip() == version):
                  found = "\n".join(lines[1:]).strip()
                  break
          print(found)
          ' "${VERSION}")
          
          NOTES=$(cat <<EOF
          ## hellqvio86.unifi v${VERSION}

          Collection built and ready for publication to Ansible Galaxy.

          ### Install
          \`\`\`bash
          ansible-galaxy collection install hellqvio86.unifi==${VERSION}
          \`\`\`

          ### Changelog
          ${CHANGELOG_NOTES:-_No changelog found in CHANGELOG.md_}
          EOF
          )
          
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --draft \
            --notes "${NOTES}" \
            "${TARBALL}"

  # Publishes to Ansible Galaxy — triggered by publishing a GitHub release, or manually
  publish-to-galaxy:
    if: >
      (github.event_name == 'release' && github.event.action == 'published') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'publish')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Build collection
        run: make build

      - name: Publish to Ansible Galaxy
        env:
          GALAXY_API_KEY: ${{ secrets.GALAXY_API_KEY }}
        run: |
          VERSION=$(grep '^version:' galaxy.yml | awk '{print $2}')
          .venv/bin/ansible-galaxy collection publish \
            "releases/hellqvio86-unifi-${VERSION}.tar.gz" \
            --api-key "${GALAXY_API_KEY}"
